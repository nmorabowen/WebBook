services:
  web:
    image: ${WEB_IMAGE}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ${WEBBOOK_ROOT}/.env.production
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ${WEBBOOK_CONTENT_HOST_PATH}:/app/content
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:3000/api/healthz')
          .then((response) => process.exit(response.ok ? 0 : 1))
          .catch(() => process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
