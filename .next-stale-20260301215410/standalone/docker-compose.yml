services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - redis
      - python-runner
    volumes:
      - ./content:/app/content

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  python-runner:
    build:
      context: ./services/python-runner
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
